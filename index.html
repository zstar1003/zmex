<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="全国本科院校可视化分布，基于教育部全国普通高等学校名单，用于高考志愿筛选、院校对比和区域分布查看。"
    />
    <title>全国本科院校可视化分布 | 高考志愿地图</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260609-7" />
  </head>
  <body class="home-page">
    <header class="site-header">
      <a class="site-wordmark" href="./index.html" aria-label="择校地图首页">
        <span aria-hidden="true">择</span>
        <strong>择校地图</strong>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a class="active" href="./index.html">首页</a>
        <a href="./rank.html">排名估算</a>
        <a href="./assessment.html">专业倾向测评</a>
        <a href="./about.html">关于</a>
      </nav>
    </header>

    <main class="app-shell">
      <aside class="side side-left" aria-label="院校筛选">
        <section class="panel filters-panel">
          <div class="panel-head">
            <h2>院校查询</h2>
            <button class="icon-button" id="resetFilters" title="重置筛选" aria-label="重置筛选">
              ↺
            </button>
          </div>

          <label class="field">
            <span>学校名称</span>
            <input id="searchInput" type="search" placeholder="输入校名 / 城市 / 主管部门" autocomplete="off" />
          </label>

          <label class="field">
            <span>归属省份</span>
            <select id="provinceSelect">
              <option value="">全部省份</option>
            </select>
          </label>

          <div class="field">
            <span>学校性质</span>
            <div class="check-grid" id="natureChecks">
              <label><input type="checkbox" value="公办" /> 公办</label>
              <label><input type="checkbox" value="民办" /> 民办</label>
            </div>
          </div>

          <div class="field">
            <span>重点标签</span>
            <div class="check-grid" id="tagChecks">
              <label><input type="checkbox" value="doubleFirstClass" /> 双一流</label>
              <label><input type="checkbox" value="is985" /> 985</label>
              <label><input type="checkbox" value="is211" /> 211</label>
              <label><input type="checkbox" value="vocationalUndergrad" /> 职业本科</label>
            </div>
          </div>

          <div class="field">
            <span>学校类型</span>
            <div class="chip-grid" id="categoryChips"></div>
          </div>
        </section>

        <section class="panel stats-panel">
          <div class="metric-main">
            <span id="schoolCount">0</span>
            <small>所本科院校</small>
          </div>
          <div class="metric-grid">
            <div>
              <strong id="provinceCount">0</strong>
              <span>省级区域</span>
            </div>
            <div>
              <strong id="cityCount">0</strong>
              <span>城市/地区</span>
            </div>
            <div>
              <strong id="publicCount">0</strong>
              <span>公办</span>
            </div>
            <div>
              <strong id="privateCount">0</strong>
              <span>民办</span>
            </div>
          </div>
        </section>
      </aside>

      <section class="map-stage" aria-label="全国本科院校三维地图">
        <div class="map-toolbar">
          <div class="toolbar-copy">
            <strong id="activeTitle">全国视图</strong>
            <span id="activeSubtitle">按省份密度着色，城市聚合点位</span>
          </div>
          <div class="segmented" role="group" aria-label="地图模式">
            <button class="active" data-map-mode="density">密度</button>
            <button data-map-mode="elite">重点</button>
            <button data-map-mode="private">民办</button>
          </div>
        </div>
        <div class="map-controls" aria-label="地图控制">
          <button id="resetMapView" type="button" title="重置地图视图" aria-label="重置地图视图">↺</button>
          <button id="zoomInMap" type="button" title="放大" aria-label="放大">+</button>
          <button id="zoomOutMap" type="button" title="缩小" aria-label="缩小">−</button>
          <button id="fullscreenMap" type="button" title="全屏查看" aria-label="全屏查看">⛶</button>
        </div>
        <div id="mapChart" class="map-chart" role="img" aria-label="可拖动、缩放的中国本科院校三维分布地图"></div>
        <div class="legend-card" id="legendCard">
          <span class="legend-title">本科院校数</span>
          <div class="legend-ramp" aria-hidden="true"></div>
          <div class="legend-row">
            <span>少</span>
            <span>多</span>
          </div>
        </div>
        <article class="detail-card empty" id="detailCard">
          <span class="detail-kicker">院校详情</span>
          <h2>选择地图点或列表院校</h2>
          <p>当前显示全国本科院校分布。</p>
        </article>
      </section>

      <aside class="side side-right" aria-label="院校推荐">
        <section class="panel list-panel">
          <div class="panel-head">
            <h2>推荐院校</h2>
            <span class="soft-count" id="listCount">0</span>
          </div>
          <div class="school-list" id="schoolList"></div>
          <button class="load-more" id="loadMore">显示更多</button>
        </section>
      </aside>
    </main>

    <footer class="source-bar">
      <span id="sourceText">数据来源：教育部全国普通高等学校名单</span>
      <a href="https://www.moe.gov.cn/jyb_xxgk/s5743/s5744/A03/202506/t20250627_1195683.html" target="_blank" rel="noreferrer">
        教育部原始公告
      </a>
    </footer>

    <script type="module" src="./app.js?v=20260609-7"></script>
  </body>
</html>
