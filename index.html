<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="择木而栖提供全国本科和专科院校分布地图、专业录取位次参考和专业倾向测评，支持按普通类和艺术类专业逐步筛选志愿。" />
    <meta name="keywords" content="高考志愿,院校地图,本科院校,专科院校,美术专业,舞蹈专业,音乐专业,专业录取位次,志愿填报" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="择木而栖" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="application-name" content="择木而栖" />
    <meta name="apple-mobile-web-app-title" content="择木而栖" />
    <meta name="theme-color" content="#3b2426" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="择木而栖" />
    <meta property="og:title" content="择木而栖" />
    <meta property="og:description" content="查看全国本科和专科院校分布，按普通类和艺术类专业录取位次筛选志愿范围。" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="择木而栖" />
    <meta name="twitter:description" content="查看全国本科和专科院校分布，按普通类和艺术类专业录取位次筛选志愿范围。" />
    <title>择木而栖</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260626-6" />
  </head>
  <body class="home-page">
    <header class="site-header">
      <a class="site-wordmark" href="./index.html" aria-label="择木而栖首页">
        <img src="./assets/logo-mark.svg" alt="" aria-hidden="true" />
        <strong>择木而栖</strong>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a class="active" href="./index.html">首页</a>
        <a href="./rank.html">排名估算</a>
        <a href="./assessment.html">专业倾向测评</a>
        <a href="./analysis.html">数据分析</a>
        <a href="./about.html">关于</a>
      </nav>
    </header>

    <main class="app-shell">
      <aside class="side side-left" aria-label="院校筛选">
        <section class="panel filters-panel">
          <div class="panel-head">
            <h2>院校查询</h2>
            <button class="icon-button" id="resetFilters" title="重置筛选" aria-label="重置筛选">
              ↺
            </button>
          </div>

          <label class="field">
            <span>学校名称</span>
            <input id="searchInput" type="search" placeholder="输入校名 / 城市 / 主管部门" autocomplete="off" />
          </label>

          <label class="field">
            <span>专业名称</span>
            <input id="majorInput" type="search" placeholder="输入专业，查实际录取位次" autocomplete="off" />
          </label>

          <label class="field">
            <span>归属省份</span>
            <select id="provinceSelect">
              <option value="">全部省份</option>
            </select>
          </label>

          <div class="field">
            <span>办学层次</span>
            <div class="check-grid" id="levelChecks">
              <label><input type="checkbox" value="本科" /> 本科</label>
              <label><input type="checkbox" value="专科" /> 专科</label>
            </div>
          </div>

          <div class="field">
            <span>学校性质</span>
            <div class="check-grid" id="natureChecks">
              <label><input type="checkbox" value="公办" /> 公办</label>
              <label><input type="checkbox" value="民办" /> 民办</label>
            </div>
          </div>

          <div class="field">
            <span>重点标签</span>
            <div class="check-grid" id="tagChecks">
              <label><input type="checkbox" value="doubleFirstClass" /> 双一流</label>
              <label><input type="checkbox" value="is985" /> 985</label>
              <label><input type="checkbox" value="is211" /> 211</label>
              <label><input type="checkbox" value="vocationalUndergrad" /> 职业本科</label>
            </div>
          </div>

          <div class="field">
            <span>学校类型</span>
            <div class="chip-grid" id="categoryChips"></div>
          </div>
        </section>

        <section class="panel stats-panel">
          <div class="metric-main">
            <span id="schoolCount">0</span>
            <small>所院校</small>
          </div>
          <div class="metric-inline">
            <span><strong id="provinceCount">0</strong>省份</span>
            <span><strong id="cityCount">0</strong>城市</span>
            <span><strong id="undergraduateCount">0</strong>本科</span>
            <span><strong id="juniorCollegeCount">0</strong>专科</span>
            <span><strong id="publicCount">0</strong>公办</span>
            <span><strong id="privateCount">0</strong>民办</span>
          </div>
        </section>
      </aside>

      <section class="map-stage" aria-label="全国院校省级数量地图">
        <div class="map-controls" aria-label="地图控制">
          <button id="zoomInMap" type="button" title="放大" aria-label="放大">+</button>
          <button id="zoomOutMap" type="button" title="缩小" aria-label="缩小">−</button>
          <button id="fullscreenMap" type="button" title="全屏查看" aria-label="全屏查看">⛶</button>
        </div>
        <div id="mapChart" class="map-chart" role="img" aria-label="可拖动、缩放的中国院校省级数量地图"></div>
        <div class="legend-card" id="legendCard">
          <span class="legend-title">院校数</span>
          <div class="legend-ramp" aria-hidden="true"></div>
          <div class="legend-row">
            <span>少</span>
            <span>多</span>
          </div>
        </div>
        <article class="detail-card empty" id="detailCard">
          <span class="detail-kicker">院校详情</span>
          <h2>从右侧列表选择院校</h2>
          <p>点击省份可筛选该地区的院校。</p>
        </article>
      </section>

      <aside class="side side-right" aria-label="院校推荐">
        <section class="panel list-panel">
          <div class="panel-head">
            <h2>推荐院校</h2>
            <span class="soft-count" id="listCount">0</span>
          </div>
          <div class="school-list" id="schoolList"></div>
          <button class="load-more" id="loadMore">显示更多</button>
        </section>
      </aside>
    </main>

    <footer class="source-bar">
      <p class="icp-record" style="text-align: center">
        <a href="https://beian.miit.gov.cn/" style="color: gray">陕ICP备2024034698号-2</a>
      </p>
      <span class="visit-counter">累计访问次数 <strong id="visitCount">--</strong></span>
    </footer>

    <script type="module" src="./app.js?v=20260627-art-3"></script>
  </body>
</html>
