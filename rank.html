<!doctype html>
<html class="subpage-root" lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="输入省份、科类和全省排名，按大学专业查询往年录取位次参考，筛选更符合当前排名的本科专业。" />
    <meta name="keywords" content="高考位次查询,专业录取排名,高考志愿估算,本科专业查询" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="择木而栖" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="application-name" content="择木而栖" />
    <meta name="apple-mobile-web-app-title" content="择木而栖" />
    <meta name="theme-color" content="#3b2426" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="择木而栖" />
    <meta property="og:title" content="择木而栖" />
    <meta property="og:description" content="输入省份、科类和全省排名，按大学专业查看录取位次参考。" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="择木而栖" />
    <meta name="twitter:description" content="按省份、科类和全省排名查询大学专业录取位次参考。" />
    <title>择木而栖</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260625-1" />
  </head>
  <body class="subpage-body">
    <header class="site-header">
      <a class="site-wordmark" href="./index.html" aria-label="择木而栖首页">
        <img src="./assets/logo-mark.svg" alt="" aria-hidden="true" />
        <strong>择木而栖</strong>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="./index.html">首页</a>
        <a class="active" href="./rank.html">排名估算</a>
        <a href="./assessment.html">专业倾向测评</a>
        <a href="./about.html">关于</a>
      </nav>
    </header>

    <main class="subpage-shell rank-workspace">
      <aside class="panel rank-query-panel">
        <div class="subpage-heading">
          <span>专业粒度</span>
          <h1>排名估算</h1>
          <p>同一所大学的不同专业录取位次差异很大，结果按专业分别列出。</p>
        </div>
        <form class="rank-page-form" id="rankForm">
          <label>
            <span>所在省份</span>
            <select id="rankProvinceSelect"></select>
          </label>
          <label>
            <span>科类</span>
            <select id="rankTrackSelect">
              <option value="physics">物理/理科/综合</option>
              <option value="history">历史/文科</option>
            </select>
          </label>
          <label>
            <span>全省排名</span>
            <input id="rankInput" type="number" min="1" step="1" placeholder="例如 8000" required />
          </label>
          <fieldset class="rank-target-province-field">
            <legend>院校所在省份</legend>
            <button class="target-province-toggle" id="targetProvinceToggle" type="button" aria-expanded="false" aria-controls="targetProvincePanel">不限院校省份</button>
            <div class="target-province-panel" id="targetProvincePanel" hidden>
              <div class="target-province-actions">
                <span>可多选，不选则不限</span>
                <button id="targetProvinceClear" type="button">清空</button>
              </div>
              <div class="target-province-list" id="targetProvinceList"></div>
            </div>
          </fieldset>
          <button type="submit">查询可报专业</button>
        </form>
        <div class="model-note">
          <strong>参考边界</strong>
          <p>结果优先使用考试院官方专业线，其次使用保留原始链接的公开专业录取数据。只有西藏因未公开一分一段表使用位次估算，并在结果中单独标明。</p>
        </div>
      </aside>

      <section class="rank-output" aria-live="polite">
        <header class="rank-output-head">
          <div>
            <span>查询结果</span>
            <h2 id="rankResultTitle">等待输入排名</h2>
          </div>
          <strong id="rankResultCount">0</strong>
        </header>
        <div class="rank-page-summary" id="rankSummary">选择省份、科类并输入全省排名。</div>
        <div class="rank-page-results" id="rankResults"></div>
      </section>
    </main>

    <footer class="page-footer">录取规则、选科限制和招生计划以各省考试院当年公布内容为准。</footer>
    <script type="module" src="./rank-page.js?v=20260626-2"></script>
  </body>
</html>
